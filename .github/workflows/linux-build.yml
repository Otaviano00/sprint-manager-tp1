name: C++ CMake Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    name: Build & Test

    # Github runner this will run on
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -G "CodeBlocks - Unix Makefiles" -B build

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest
